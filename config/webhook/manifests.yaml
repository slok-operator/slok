---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-observability-slok-io-v1alpha1-servicelevelobjective
  failurePolicy: Fail
  name: vservicelevelobjective-v1alpha1.kb.io
  rules:
  - apiGroups:
    - observability.slok.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - servicelevelobjectives
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-observability-slok-io-v1alpha1-slocomposition
  failurePolicy: Fail
  name: vslocomposition-v1alpha1.kb.io
  rules:
  - apiGroups:
    - observability.slok.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - slocompositions
  sideEffects: None
