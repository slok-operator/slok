---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - observability.slok.io
  resources:
  - servicelevelobjectives
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - observability.slok.io
  resources:
  - servicelevelobjectives/finalizers
  verbs:
  - update
- apiGroups:
  - observability.slok.io
  resources:
  - servicelevelobjectives/status
  verbs:
  - get
  - patch
  - update
