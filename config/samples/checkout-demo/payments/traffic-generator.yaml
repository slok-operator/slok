apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-traffic-gen
  namespace: checkout
  labels:
    app: payments-traffic-gen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payments-traffic-gen
  template:
    metadata:
      labels:
        app: payments-traffic-gen
    spec:
      containers:
        - name: generator
          image: curlimages/curl:8.5.0
          env:
            - name: TARGET_URL
              value: "http://payments-svc.checkout.svc:9898"
            # ERROR_RATE_PCT: percentage of requests that return 500.
            # Accepts integers from 0 to 100.
            # Change at runtime with: kubectl set env deployment/payments-traffic-gen ERROR_RATE_PCT=10
            - name: ERROR_RATE_PCT
              value: "0"
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                if [ $(( RANDOM % 100 )) -lt "${ERROR_RATE_PCT:-0}" ]; then
                  curl -s -o /dev/null "${TARGET_URL}/status/500"
                else
                  curl -s -o /dev/null "${TARGET_URL}/"
                fi
                sleep 0.5
              done
