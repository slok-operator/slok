                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastUpdateTime:
                description: lastUpdateTime indicates the last time the status was
                  updated.
                format: date-time
                type: string
              objectives:
                description: objectives represent the current status of each objective
                  defined in the spec.
                items:
                  description: ObjectiveStatus represents the observed state of a
                    single objective.
                  properties:
                    actual:
                      description: actual is the current SLI percentage (e.g., 99.87).
                      type: number
                    burnRate:
                      description: burnRate contains the observed burn rate metrics.
                      items:
