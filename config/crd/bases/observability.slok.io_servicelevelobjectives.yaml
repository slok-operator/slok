                            alerts.
                          properties:
                            alerts:
                              description: |-
                                alerts is a list of budget alerting rules.
                                Each alert specifies a threshold percentage and severity level.
                              items:
                                properties:
                                  name:
                                    description: name is the unique identifier for
                                      this budget alert.
                                    minLength: 1
                                    type: string
                                  percent:
                                    description: percent is the error budget remaining
                                      threshold below which the alert fires (e.g.,
                                      10.0 means < 10%).
                                    maximum: 100
                                    minimum: 0
                                    type: number
                                  severity:
                                    description: severity is the alert severity level
                                      (e.g., "critical", "warning").
