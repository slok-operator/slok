                            alerts:
                              description: name is the unique identifier for this
                                burn rate alert.
                              items:
                                properties:
                                  consumePercent:
                                    description: |-
                                      consumePercent is the percentage of error budget that would be consumed
                                      within the consumeWindow at the current burn rate to trigger the alert (e.g., 2.0 means 2%).
                                    minimum: 0
                                    type: number
                                  consumeWindow:
                                    description: consumeWindow is the time window
                                      used to compute the burn rate threshold (e.g.,
                                      "1h", "6h").
                                    pattern: ^(\d+d|\d+h|\d+m|\d+s)$
                                    type: string
                                  longWindow:
                                    description: longWindow is the long observation
                                      window for the burn rate query (e.g., "1h").
                                    pattern: ^(\d+d|\d+h|\d+m|\d+s)$
                                    type: string
                                  name:
                                    minLength: 1
                                    type: string
                                  severity:
                                    description: severity is the alert severity level
                                      (e.g., "critical", "warning").
                                    enum:
                                    - critical
                                    - warning
                                    - info
                                    type: string
                                  shortWindow:
                                    description: shortWindow is the short observation
                                      window for the burn rate query (e.g., "5m").
                                    pattern: ^(\d+d|\d+h|\d+m|\d+s)$
                                    type: string
                                required:
                                - consumePercent
                                - consumeWindow
                                - longWindow
                                - name
                                - severity
                                - shortWindow
