<svg width="1600" height="800" viewBox="0 0 1600 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SloK hero illustration</title>
  <desc id="desc">Dark themed banner with Kubernetes, SLO, and time-series motifs.</desc>

  <defs>
    <linearGradient id="bg" x1="120" y1="60" x2="1480" y2="740" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0B1730"/>
      <stop offset="1" stop-color="#050A14"/>
    </linearGradient>
    <linearGradient id="accentCyan" x1="340" y1="170" x2="1230" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#44E1FF"/>
      <stop offset="0.55" stop-color="#4DD6B9"/>
      <stop offset="1" stop-color="#5D7CFF"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="520" y1="180" x2="1130" y2="650" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9DFF7A"/>
      <stop offset="1" stop-color="#2FD8A3"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 392) rotate(90) scale(290 520)">
