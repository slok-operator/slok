{{- if .Values.dashboard.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "slok.fullname" . }}-dashboard-rolebinding
  labels:
    {{- include "slok.dashboardLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "slok.fullname" . }}-dashboard-role
subjects:
- kind: ServiceAccount
  name: {{ include "slok.dashboardServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
