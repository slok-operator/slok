apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "slok.fullname" . }}-manager-role
  labels:
    {{- include "slok.labels" . | nindent 4 }}
rules:
- apiGroups:
  - observability.slok.io
  resources:
  - servicelevelobjectives
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - observability.slok.io
  resources:
  - servicelevelobjectives/finalizers
  verbs:
  - update
- apiGroups:
  - observability.slok.io
  resources:
  - servicelevelobjectives/status
  verbs:
  - get
  - patch
  - update
{{- if .Values.metrics.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "slok.fullname" . }}-metrics-auth-role
  labels:
    {{- include "slok.labels" . | nindent 4 }}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "slok.fullname" . }}-metrics-reader
  labels:
    {{- include "slok.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - /metrics
  verbs:
  - get
{{- end }}
