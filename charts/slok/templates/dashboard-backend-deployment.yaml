{{- if .Values.dashboard.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slok.dashboardBackendName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slok.dashboardLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard-backend
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "slok.dashboardBackendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "slok.dashboardBackendSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "slok.dashboardServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.dashboard.securityContext | nindent 8 }}
      containers:
      - name: backend
        image: "{{ .Values.dashboard.backend.image.repository }}:{{ .Values.dashboard.backend.image.tag }}"
        imagePullPolicy: {{ .Values.dashboard.backend.image.pullPolicy }}
        args:
        - --addr=:{{ .Values.dashboard.backend.service.port }}
        {{- if .Values.dashboard.namespace }}
        - --namespace={{ .Values.dashboard.namespace }}
        {{- end }}
        {{- if .Values.dashboard.prometheus.url }}
        env:
        - name: PROMETHEUS_URL
          value: {{ .Values.dashboard.prometheus.url | quote }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.dashboard.backend.service.port }}
          protocol: TCP
        securityContext:
          {{- toYaml .Values.dashboard.backend.containerSecurityContext | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.dashboard.backend.resources | nindent 10 }}
      {{- with .Values.dashboard.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.dashboard.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
