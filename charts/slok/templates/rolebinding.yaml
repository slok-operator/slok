{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "slok.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "slok.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "slok.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "slok.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
