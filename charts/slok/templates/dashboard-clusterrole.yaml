{{- if .Values.dashboard.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "slok.fullname" . }}-dashboard-role
  labels:
    {{- include "slok.dashboardLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
rules:
- apiGroups:
  - observability.slok.io
  resources:
  - servicelevelobjectives
  - slocompositions
  - slocorrelations
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - monitoring.coreos.com
  resources:
  - prometheusrules
  verbs:
  - get
  - list
  - watch
{{- end }}
