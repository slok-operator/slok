apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "slok.fullname" . }}-manager-rolebinding
  labels:
    {{- include "slok.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "slok.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "slok.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- if .Values.metrics.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "slok.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "slok.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "slok.fullname" . }}-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: {{ include "slok.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
