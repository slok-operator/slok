replicaCount: 1

image:
  repository: ghcr.io/federicolepera/slok
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

leaderElection:
  enabled: true

webhook:
  enabled: true
  port: 9443
  failurePolicy: Fail

certManager:
  enabled: true
  issuer:
    create: true
    name: ""

metrics:
  enabled: true
  port: 8443

groq:
  # apiKey is optional. If set, the correlation engine uses the Groq LLM to refine correlation summaries.
  # Use either apiKey (plain text) or existingSecret (reference to a pre-existing Kubernetes Secret).
  apiKey: ""
  existingSecret:
    # name of the existing Secret containing the Groq API key.
    name: ""
    # key inside the Secret.
    key: "GROQ_API_KEY"

prometheus:
  # url is optional. If empty, the operator uses its built-in default (http://localhost:9090).
  # Example: "http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090"
  url: ""

healthProbe:
  port: 8081

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

securityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
